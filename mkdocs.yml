site_name: Infrastructure with Podman and Quadlet
site_url: http://localhost:8080
repo_url: https://github.com/seletz/infra-podman-quadlet-test
theme:
  name: material
  palette:
    primary: deep purple
    accent: purple
  font:
    text: Roboto
  features:
    - navigation.instant
    - navigation.tabs
    - toc.follow
    - toc.integrate
    - navigation.top
    - content.code.copy
    - content.code.select
    - content.code.annotate

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - pymdownx.superfences
